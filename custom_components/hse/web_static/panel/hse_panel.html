<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HSE — Home Suivi Élec</title>
  <style>
    /* Reset et base globale — pas de Shadow DOM ici (DELTA-052) */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: var(--font-body, system-ui, sans-serif);
      background: #111;
      color: #e0e0e0;
      overflow: hidden;
    }

    #hse-root {
      width: 100%;
      height: 100%;
      overflow: auto;
    }

    /* État d'initialisation affiché pendant l'attente du token */
    #hse-init {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 16px;
      color: #aaa;
      font-size: 14px;
    }

    #hse-init .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid #333;
      border-top-color: #4f98a3;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* État d'erreur */
    #hse-error {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 12px;
      color: #d163a7;
      font-size: 14px;
      text-align: center;
      padding: 32px;
    }

    #hse-error strong {
      font-size: 16px;
      color: #e0e0e0;
    }
  </style>
</head>
<body>

  <!-- État initial : en attente du token HA -->
  <div id="hse-init">
    <div class="spinner"></div>
    <span>Initialisation HSE…</span>
  </div>

  <!-- État erreur : affiché si le shell ne charge pas -->
  <div id="hse-error">
    <strong>Erreur de chargement</strong>
    <span id="hse-error-msg">Le shell HSE n'a pas pu être chargé.</span>
    <small>Vérifiez les logs HA et rechargez la page.</small>
  </div>

  <!-- Conteneur principal — rempli par hse_shell.js après auth -->
  <div id="hse-root" style="display:none;"></div>

  <script type="module">
    /**
     * hse_panel.html — Bootstrap de l'iframe HSE (DELTA-052 étape 0c)
     *
     * Flux :
     *   1. DOMContentLoaded → envoie postMessage {type:'hse-ready'} au parent
     *   2. Reçoit postMessage {type:'hse-auth', token} → stocke window.__hseToken
     *   3. Import dynamique de hse_shell.js → new HseShell().mount(root)
     *   4. Affiche #hse-root, masque #hse-init
     */

    const elInit  = document.getElementById('hse-init');
    const elError = document.getElementById('hse-error');
    const elErrorMsg = document.getElementById('hse-error-msg');
    const elRoot  = document.getElementById('hse-root');

    function showError(msg) {
      elInit.style.display  = 'none';
      elRoot.style.display  = 'none';
      elError.style.display = 'flex';
      if (msg) elErrorMsg.textContent = msg;
    }

    function showRoot() {
      elInit.style.display  = 'none';
      elError.style.display = 'none';
      elRoot.style.display  = 'block';
    }

    // Étape 1 : signaler au parent que l'iframe est prête
    window.parent.postMessage({ type: 'hse-ready' }, '*');

    // Timeout de sécurité : si le token n'arrive pas en 10s, afficher une erreur
    const authTimeout = setTimeout(() => {
      showError('Token HA non reçu après 10 secondes. Rechargez la page.');
    }, 10_000);

    // Étape 2 : attendre le token HA
    window.addEventListener('message', async function onAuth(event) {
      const msg = event.data;
      if (!msg || msg.type !== 'hse-auth' || !msg.token) return;

      // On n'accepte qu'un seul message hse-auth
      window.removeEventListener('message', onAuth);
      clearTimeout(authTimeout);

      // Stocker le token — hse_fetch.js le lira depuis window.__hseToken
      window.__hseToken = msg.token;

      // Étape 3 : charger le shell
      try {
        const { HseShell } = await import('/hse-static/shared/hse_shell.js');
        showRoot();
        // Étape 4 : démarrer le routing
        const shell = new HseShell();
        await shell.mount(elRoot);
      } catch (err) {
        console.error('[HSE] Erreur chargement hse_shell.js :', err);
        showError(`Impossible de charger hse_shell.js — ${err.message}`);
      }
    });
  </script>

</body>
</html>
